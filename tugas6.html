<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ini linknya Dava </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1f3c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            background-color: #2e3660;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            position: relative; 
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4a559e;
            margin-bottom: 20px;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profile-bio {
            font-size: 14px;
            color: #d1d5db;
            margin-bottom: 30px;
        }

        .link-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-link {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-blue {
            background-color: #4a6fff;
            color: white;
        }

        #btn-connect {
            background-color: #ff4d6d;
            color: white;
        }

        .btn-link:hover {
            transform: translateY(-3px);
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-blue:hover {
            background-color: #3b5bdb;
        }

        #btn-connect:hover {
            background-color: #e03a5a;
        }

        .video-title-container {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .video-title-container::before {
            content: "🎬 ";
        }

        .video-embed-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 25px;
            z-index: 1;
        }

        .video-embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .footer-text {
            font-size: 12px;
            color: #a1a7c4;
            margin-bottom: 15px;
        }

        .closing-text {
            font-size: 11px;
            color: #838ab3;
            font-style: italic;
        }

    </style>
</head>
<body>

    <div class="profile-container">
        
        <img src="dava.jpeg" alt="Avatar Bram" class="avatar">
        
        <h1 class="profile-name">Dava Ismi Fadil</h1>
        <p class="profile-bio">Suka Mole | Suka Makan | Suka Tidur</p>
        
        <div class="link-buttons">
            <a href="#" class="btn-link btn-blue">GitHub Dava</a>
            <a href="#" class="btn-link btn-blue">LinkedIn</a>
            <a href="#" class="btn-link btn-blue">Instagram</a>
            <a href="#" class="btn-link" id="btn-connect">Connect Yuk</a>
        </div>
        
        <div class="video-title-container">
            Jangan Perang Dulu Pliss
        </div>

        <div class="video-embed-container">
           <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/13ARO0HDZsQ?si=UldW-n5joHFUVLBJ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
        
        <p class="footer-text">Jangan lupa bernafas!!</p>
        <p class="closing-text">Semangat Ngodingnya sahabat 🙏🔥</p>

    </div>

</body>
</html>
